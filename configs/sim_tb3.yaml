# Simulation Configuration (TurtleBot3)
# Configuration for Gazebo/ROS simulation environment

hardware:
  platform: "turtlebot3"
  environment: "simulation"
  simulator: "gazebo"
  
camera:
  width: 640
  height: 480
  fps: 30
  topic: "/camera/image_raw"
  
perception:
  detector:
    model_path: "demos/rpi_yolov5_tflite/models/yolov5s-int8.tflite"
    input_size: [640, 640]
    confidence_threshold: 0.25
    nms_threshold: 0.45
  
navigation:
  planner:
    type: "astar"
    resolution: 0.05
    inflation_radius: 0.2
  
mapping:
  slam:
    type: "gmapping"  # ROS2 SLAM
    map_resolution: 0.05
    map_size: [100, 100]

ros:
  namespace: ""
  use_sim_time: true
  topics:
    cmd_vel: "/cmd_vel"
    odom: "/odom"
    scan: "/scan"
    camera: "/camera/image_raw"
